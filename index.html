  measurementId: "G-J1XF5QEN4D"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "inversiones", "portfolio");

// ── Auth UI ──



// ── Guardar estado en Firestore ──
async function saveToFirebase() {
  try {
    await setDoc(DOC_REF, {
      positions,
      acctNames,
      TC,
      updatedAt: new Date().toISOString(),
      headerDate: document.getElementById('headerDate').textContent
    });
    console.log("✓ Guardado en Firebase");
  } catch(e) {
    console.error("✗ Error guardando en Firebase:", e);
  }
}

// ── Cargar estado desde Firestore al abrir ──
async function loadFromFirebase() { // returns Promise
  const loadingEl = document.getElementById('emptyState');
  loadingEl.querySelector('h2').textContent = 'Cargando datos...';
  loadingEl.querySelector('p').textContent = 'Conectando con la base de datos...';
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) {
      const data = snap.data();
      positions = data.positions || [];
      Object.assign(acctNames, data.acctNames || {});
      if (data.TC) TC = data.TC;
      if (data.headerDate) document.getElementById('headerDate').textContent = data.headerDate;
      allAccounts = [...new Set(positions.map(p => p.cuenta))];
      selectedAccounts = [...allAccounts];
      rebuildAccountChips();
      showExportBtn();
      renderAll();
      console.log("✓ Datos cargados desde Firebase");
    } else {
      loadingEl.querySelector('h2').textContent = 'Sin datos cargados';
      loadingEl.querySelector('p').textContent = 'Pegá el texto del extracto de AUNE usando el botón "Cargar Extracto" para comenzar.';
    }
  } catch(e) {
    console.error("✗ Error cargando desde Firebase:", e);
    // Si falla por permisos, cerrar sesión y volver al login
    if (e.code === 'permission-denied' || e.code === 'unauthenticated') {
      await signOut(auth);
    } else {
      loadingEl.querySelector('h2').textContent = 'Sin datos cargados';
      loadingEl.querySelector('p').textContent = 'Pegá el texto del extracto de AUNE usando el botón "Cargar Extracto" para comenzar.';
    }
  }
}


// Exponer funciones a scope global
window._firebaseSave = saveToFirebase;
window._firebaseLoad = loadFromFirebase;
</script>

      selectedAccounts = [...allAccounts];
      rebuildAccountChips();
      showExportBtn();
      renderAll();
      console.log("✓ Datos cargados desde Firebase");
    } else {
      loadingEl.querySelector('h2').textContent = 'Sin datos cargados';
      loadingEl.querySelector('p').textContent = 'Pegá el texto del extracto de AUNE usando el botón "Cargar Extracto" para comenzar.';
    }
  } catch(e) {
    console.error("✗ Error cargando desde Firebase:", e);
    // Si falla por permisos, cerrar sesión y volver al login
    if (e.code === 'permission-denied' || e.code === 'unauthenticated') {
      await signOut(auth);
    } else {
      loadingEl.querySelector('h2').textContent = 'Sin datos cargados';
      loadingEl.querySelector('p').textContent = 'Pegá el texto del extracto de AUNE usando el botón "Cargar Extracto" para comenzar.';
    }
  }
}

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let TC = 1415;
let currency = 'ARS';
let positions = [];
let allAccounts = [];
let selectedAccounts = [];
let selectedEstado = 'all';
const acctNames = {};
const acctColors_palette = ['var(--accent)','var(--blue)','var(--green)','var(--purple)','var(--orange)','var(--cyan)'];
let pendingCount = 0;
let selectedEfectivo = 'all';

// ═══════════════════════════════════════════
// PARSER v2 — joins broken PDF lines first
// ═══════════════════════════════════════════
function parseNum(s) { if (!s) return 0; return parseFloat(s.replace(/\./g,'').replace(',','.')); }

function parseAuneExtract(text) {
  const results = [];
  const rawLines = text.split('\n');

  // ── Extract cuenta ──
  let cuenta = '', cuentaNombre = '';
  for (const l of rawLines) {
    const m = l.match(/[Cc]uenta[:\s]*\[(\d+)\]\s*(.+?)(?:\s*Fecha|\.\s*$|$)/);
    if (m) { cuenta = m[1]; cuentaNombre = m[2].replace(/\s+/g,' ').trim().replace(/\.$/, ''); break; }
  }
  if (!cuenta) return { error: 'No se detectó número de cuenta.' };

  // ── Extract TC — usar siempre USDL (Dólares MtR) ──
  let extractedTC = null;
  for (const l of rawLines) {
    const m = l.match(/cotizaci[oó]n en D[oó]lares MtR\s*\(USDL\)[^(]*\([\d/]+\)\s*ARS\s+([\d.,]+)/i);
    if (m) { const v = parseNum(m[1]); if (v > 100 && v < 200000) { extractedTC = v; break; } }
  }
  // Fallback: cualquier línea USDL
  if (!extractedTC) {
    for (const l of rawLines) {
      const m = l.match(/\(USDL\)[^(]*\([\d/]+\)\s*ARS\s+([\d.,]+)/i);
      if (m) { const v = parseNum(m[1]); if (v > 100 && v < 200000) { extractedTC = v; break; } }
    }
  }
  // Fallback general
  if (!extractedTC) {
    for (const l of rawLines) {
      const m = l.match(/\([\d/]+\)\s*ARS\s+([\d.,]+)/);
      if (m) { const v = parseNum(m[1]); if (v > 100 && v < 200000) { extractedTC = v; break; } }
    }
  }

  // ── Step 1: Join broken lines ──
  // A complete data line ends with a number + space + A or D
  const DATA_END = /[\d,]+\s+[AD]\s*$/;
  const SKIP_LINE = /^(Resumen|C\.U\.I\.T|I\.V\.A|ING\.|Santa Fe|Rosario|Tel:|E-mail|Web:|Hoja|Los precios|Conforme)/i;
  const SECTION_LINE = /^(Posiciones con cotización|Total |Dinero\s|Moneda en ARS\s|Acciones\s|Cedears\s|Fondos de Inversión|Obligaciones Negociables|Títulos de Deuda|Títulos Públicos|Pagares en|Futuros\s|Derivados\s|Warrants\s|MONEDA\s|PRIVADO|PUBLICO)/i;
  // Summary totals: "Acciones 1.905.600.900,00 A" or "MONEDA 34.079.341,10 A"
  const SUMMARY_TOTAL = /^(Moneda en ARS|MONEDA|Acciones|Cedears|Fondos de Inversión[^\n]*|Obligaciones Negociables[^\n]*|Títulos de Deuda[^\n]*|Títulos Públicos[^\n]*|Pagares[^\n]*|Dinero|PRIVADO|PUBLICO)\s+[\d.,]+\s*[AD]?\s*$/i;

  const joined = [];
  let buf = '';
  for (const raw of rawLines) {
    const line = raw.trim();
    if (!line) continue;
    if (SKIP_LINE.test(line)) { if (buf) { joined.push(buf); buf = ''; } continue; }
    if (SECTION_LINE.test(line) && !line.startsWith('[')) {
      if (buf) { joined.push(buf); buf = ''; }
      joined.push(line);
      continue;
    }
    // Accumulate
    buf = buf ? buf + ' ' + line : line;
    if (DATA_END.test(buf)) { joined.push(buf); buf = ''; }
  }
  if (buf) joined.push(buf);

  // ── Step 2: Parse joined lines ──
  let currentSection = '';
  let sectionCurrency = 'ARS';
  let sectionFX = 1;
  const SKIP_SEC = /futuros|derivados|warrants|opciones/i;

  for (const line of joined) {
    // Currency section header
    const curM = line.match(/Posiciones con cotización en\s+.+?\((\w+(?:-\w+)?)\)(?:.*?ARS\s+([\d.,]+))?/i);
    if (curM) { sectionCurrency = curM[1]; sectionFX = curM[2] ? parseNum(curM[2]) : 1; continue; }

    // Asset section header (has "Lugar" keyword)
    if (line.includes('Lugar') && line.includes('Estado')) {
      const secM = line.match(/^(.+?)\s+Lugar/i);
      if (secM) currentSection = secM[1].trim().toLowerCase();
      continue;
    }

    // Summary totals — skip
    if (SUMMARY_TOTAL.test(line)) continue;
    if (/^(Total|MONEDA|PRIVADO|PUBLICO)\s/i.test(line)) continue;

    // Skip unwanted sections
    if (SKIP_SEC.test(currentSection)) continue;

    // Must be a data line
    if (!DATA_END.test(line)) continue;

    // ── CASH lines: start with ARS/USD/USDC/USDL/USDB/USDC-RJ ──
    const cashM = line.match(/^(ARS|USD|USDC|USDL|USDB|USDC-RJ)\s+(\S+)\s+(Disponible|Garantía)\s+(.+)/);
    if (cashM) {
      const cur = cashM[1], lugar = cashM[2], estado = cashM[3], rest = cashM[4];
      const allNums = [...rest.matchAll(/([\d.,]+)\s+([AD])/g)];
      if (allNums.length >= 1) {
        const last = allNums[allNums.length - 1];
        const impVal = parseNum(last[1]) * (last[2]==='D'?-1:1);
        // quantity = 3rd number group (total) or 1st
        const cantIdx = allNums.length >= 3 ? 2 : 0;
        const cant = parseNum(allNums[cantIdx][1]) * (allNums[cantIdx][2]==='D'?-1:1);
        let importeARS = (sectionCurrency === 'ARS' || cur === 'ARS') ? impVal : impVal * sectionFX;
        results.push({ cuenta, tipo:'Efectivo', subtipo: cur==='ARS'?'ARS':cur, ticker:cur, nombre:lugar, cantidad:cant, precio:0, moneda:cur, importeARS, estado });
      }
      continue;
    }

    // ── ASSET lines: start with [CODE] ──
    const assetM = line.match(/^\[([^\]]+)\]\s+(.+?)\s+(CV\/\S+|A3\/\S+|XMEV\/\S+|XROX\/\S+|Local\/\S+)\s+(Disponible|Garantía)\s+(.+)/);
    if (!assetM) {
      // Try moneda line: "[7000] USD CV EX - DÓLARES CV EXTERIOR CV/CVCUS Disponible ..."
      // These were already joined, try broader match
      const monM = line.match(/^\[(\d+)\]\s+(.+?)\s+(CV\/\S+|A3\/\S+)\s+(Disponible|Garantía)\s+(.+)/);
      if (monM && currentSection.includes('moneda')) {
        const estado = monM[4], rest = monM[5];
        const allNums = [...rest.matchAll(/([\d.,]+)\s+([AD])/g)];
        if (allNums.length >= 1) {
          const last = allNums[allNums.length-1];
          const impVal = parseNum(last[1]) * (last[2]==='D'?-1:1);
          const cantIdx = allNums.length >= 3 ? 2 : 0;
          const cant = parseNum(allNums[cantIdx][1]) * (allNums[cantIdx][2]==='D'?-1:1);
          results.push({ cuenta, tipo:'Efectivo', subtipo:'USD Cable', ticker:'USD CV EX', nombre:monM[2].trim(), cantidad:cant, precio:0, moneda:'USD', importeARS:impVal, estado });
        }
      }
      continue;
    }

    const code = assetM[1];
    const tickerAndName = assetM[2].trim();
    const estado = assetM[4];
    const numPart = assetM[5];

    // Split "TICKER - NAME"
    let ticker = '', nombre = '';
    const tnS = tickerAndName.match(/^(\S+)\s*-\s*(.+)$/);
    if (tnS) { ticker = tnS[1]; nombre = tnS[2].trim(); }
    else if (currentSection.includes('pagare') || tickerAndName.match(/^Pag\s+\d+/i)) {
      // Pagarés: "[#UFT310760002] Pag 141543 Vto. 31/07/2026..." → usar el nro de pagaré como ticker
      const pagN = tickerAndName.match(/Pag\s+(\d+)/i);
      ticker = pagN ? 'PAG-'+pagN[1] : (code.replace(/[#]/g,'').substring(0,12));
      nombre = tickerAndName.trim();
    } else { ticker = tickerAndName.split(/\s/)[0]; nombre = tickerAndName; }

    // Parse numbers: liquidado A/D, porliq A/D, total A/D, (date) precio, importe A/D
    const allNums = [...numPart.matchAll(/([\d.,]+)\s+([AD])/g)];
    if (allNums.length < 1) continue;

    const last = allNums[allNums.length-1];
    const importe = parseNum(last[1]) * (last[2]==='D'?-1:1);

    // Total = 3rd num group
    let cantidad = 0;
    if (allNums.length >= 3) {
      cantidad = parseNum(allNums[2][1]) * (allNums[2][2]==='D'?-1:1);
    } else {
      cantidad = parseNum(allNums[0][1]) * (allNums[0][2]==='D'?-1:1);
    }

    // Precio after date ref
    let precio = 0;
    const precM = numPart.match(/\([\d/]+\)\s+([\d.,]+)/);
    if (precM) precio = parseNum(precM[1]);

    // Avales bancarios: nombre contiene "Aval" — no suman a cartera
    const esAval = /aval/i.test(nombre);
    if (esAval) {
      // Registrar con tipo Aval e importeARS=0 (no suma al portafolio)
      // El VN/garantizado va en cantidad
      results.push({ cuenta, tipo:'Aval', subtipo:'Aval Bancario', ticker, nombre, cantidad, precio:0, moneda:sectionCurrency, importeARS:0, estado });
      continue;
    }
    // S/C zero: T-Bill → valuar a 1 USD par; resto → skipear
    if (importe === 0 && precio === 0) {
      if (/us treasury/i.test(nombre) && cantidad > 0) {
        const tcTBill = sectionFX > 1 ? sectionFX : TC;
        const vtoTB = (nombre.match(/V[.\s]?(\d{2}\/\d{2}\/\d{2,4})/) || nombre.match(/(\d{2}\/\d{2}\/\d{2,4})/) || [])[1] || '';
        results.push({ cuenta, tipo:'T-Bill', subtipo:'US Treasury', ticker:'T-BILL', nombre, cantidad, precio:1, moneda:'USD', importeARS:cantidad * tcTBill, estado, ...(vtoTB?{vto:vtoTB}:{}) });
      }
      continue;
    }

    // ── Classify ──
    let tipo = '', subtipo = '';
    const sec = currentSection;
    const ll = line.toLowerCase();

    if (sec.includes('acciones') || ll.includes(' ord ') || ll.includes('accs') || ll.includes('escrit') || ll.includes('1v') || ll.includes('1 voto')) {
      tipo = 'Acciones'; subtipo = 'Acciones';
    } else if (sec.includes('cedear') || ll.includes('cedear')) {
      tipo = 'CEDEAR'; subtipo = 'CEDEAR';
    } else if (sec.includes('fondos de inversión') || code.includes('CAFCI') || ll.includes('fci')) {
      tipo = 'FCI'; subtipo = sectionCurrency !== 'ARS' ? 'FCI USD' : 'FCI ARS';
    } else if (sec.includes('obligaciones negociables')) {
      tipo = 'ON'; subtipo = 'ON USD';
    } else if (ll.includes('us treasury')) {
      tipo = 'T-Bill'; subtipo = 'US Treasury';
    } else if (sec.includes('pagares')) {
      tipo = 'Pagaré'; subtipo = sectionCurrency.includes('USDB') ? 'Pagaré USDB' : 'Pagaré USD';
    } else if (sec.includes('títulos de deuda')) {
      if (ll.includes('us treasury')) { tipo = 'T-Bill'; subtipo = 'US Treasury'; }
      else if (ticker.match(/^[SD]\d/) || ll.includes('letra') || ll.includes('lt ') || ll.includes('cero cupon')) {
        tipo = 'Letra'; subtipo = (ll.includes('usd') || ll.includes('u$s') || ll.includes('vinc')) ? 'Letra USD' : 'Lecap/Lecer';
      } else { tipo = 'Bono'; subtipo = 'Bono'; }
    } else if (sec.includes('títulos públicos')) {
      if (ticker.match(/^(AL|AE|GD)/)) { tipo = 'Bono'; subtipo = 'Bono USD'; }
      else if (ll.includes('cer') || ll.includes('ajust')) { tipo = 'Bono'; subtipo = 'Bono CER'; }
      else if (ll.includes('usd') || ll.includes('u$s') || ll.includes('vinc')) { tipo = 'Bono'; subtipo = 'Bono USD'; }
      else { tipo = 'Bono'; subtipo = 'Bono ARS'; }
    } else if (sec.includes('moneda')) {
      tipo = 'Efectivo'; subtipo = 'USD Cable'; ticker = 'USD CV EX';
    } else {
      if (ticker.match(/^(AL|AE|GD|TZ|TT|T\d)/)) { tipo = 'Bono'; subtipo = 'Bono'; }
      else { tipo = 'Otros'; subtipo = 'Otros'; }
    }

    // importeARS
    let importeARS = importe;
    if (sectionCurrency !== 'ARS' && sectionFX > 1) {
      importeARS = importe * sectionFX;
    }

    // Vencimiento
    let vto = '';
    const vM = nombre.match(/V[\s.]?(\d{2}\/\d{2}\/\d{2,4})/);
    if (vM) vto = vM[1];
    else { const v2 = nombre.match(/(\d{2}\/\d{2}\/\d{2,4})/); if (v2) vto = v2[1]; }

    results.push({ cuenta, tipo, subtipo, ticker, nombre, cantidad, precio, moneda:sectionCurrency, importeARS, estado, ...(vto?{vto}:{}) });
  }

  return { cuenta, cuentaNombre, positions: results, tc: extractedTC };
}

// ═══════════════════════════════════════════
// IMPORT LOGIC
// ═══════════════════════════════════════════
function importExtract(text) {
  const result = parseAuneExtract(text);
  if (result.error) return { success:false, message:result.error };
  const { cuenta, cuentaNombre, positions:newPos, tc } = result;
  if (tc) TC = tc;
  positions = positions.filter(p => p.cuenta !== cuenta);
  positions.push(...newPos);
  acctNames[cuenta] = cuentaNombre || cuenta;
  allAccounts = [...new Set(positions.map(p => p.cuenta))];
  selectedAccounts = [...allAccounts];
  const fechaM = text.match(/Fecha[:\s]+(\d{2}\/\d{2}\/\d{4})/i);
  const fechaStr = fechaM ? fechaM[1] : new Date().toLocaleDateString('es-AR');
  document.getElementById('headerDate').textContent = '📅 ' + fechaStr;
  // Guardar en Firebase automáticamente
  if(window._firebaseSave) window._firebaseSave();
  return { success:true, message:`Cuenta [${cuenta}] ${cuentaNombre}: ${newPos.length} posiciones cargadas. TC: ${TC.toLocaleString('es-AR')}` };
}

// ═══════════════════════════════════════════
// UI REBUILD
// ═══════════════════════════════════════════
function showExportBtn() {
  const hasData = positions.length > 0;
  document.getElementById('btnExportPNG').style.display = hasData ? 'inline-block' : 'none';
  document.getElementById('btnClear').style.display = hasData ? 'inline-block' : 'none';
}

function rebuildAccountChips() {
  showExportBtn();
  const c = document.getElementById('acctChips');
  let h = `<button class="acct-chip active" data-acct="all">Todas</button>`;
  allAccounts.forEach(a => { const n=(acctNames[a]||a).replace(/^ROAGRO\s*/i,'').substring(0,15); h+=`<button class="acct-chip" data-acct="${a}">${a} ${n}</button>`; });
  c.innerHTML = h;
  c.querySelectorAll('.acct-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const acct = chip.dataset.acct;
      if (acct === 'all') {
        selectedAccounts = [...allAccounts];
        c.querySelectorAll('.acct-chip').forEach(x => x.classList.remove('active'));
        chip.classList.add('active');
      } else {
        const allBtn = c.querySelector('[data-acct="all"]');
        const allModeActive = allBtn.classList.contains('active');
        if (allModeActive) {
          // Saliendo del modo "Todas": seleccionar solo esta cuenta
          c.querySelectorAll('.acct-chip').forEach(x => x.classList.remove('active'));
          chip.classList.add('active');
          selectedAccounts = [acct];
        } else {
          // Toggle individual dentro de selección múltiple
          if (chip.classList.contains('active')) {
            chip.classList.remove('active');
            selectedAccounts = selectedAccounts.filter(a => a !== acct);
            if (!selectedAccounts.length) {
              selectedAccounts = [...allAccounts];
              c.querySelectorAll('.acct-chip').forEach(x => x.classList.remove('active'));
              allBtn.classList.add('active');
            }
          } else {
            chip.classList.add('active');
            if (!selectedAccounts.includes(acct)) selectedAccounts.push(acct);
            // Si ya están todas, volver a modo "Todas"
            if (allAccounts.every(a => selectedAccounts.includes(a))) {
              c.querySelectorAll('.acct-chip').forEach(x => x.classList.remove('active'));
              allBtn.classList.add('active');
            }
          }
        }
      }
      renderAll();
    });
  });
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function getFiltered(){return positions.filter(p=>{if(!selectedAccounts.includes(p.cuenta))return false;if(p.tipo==='Aval')return false;if(selectedEstado!=='all'&&p.estado!==selectedEstado)return false;return true;});}
function getAvales(){
  // Consolidar avales: múltiples filas del mismo aval → tomar la de cantidad positiva (Garantía)
  const raw=positions.filter(p=>selectedAccounts.includes(p.cuenta)&&p.tipo==='Aval');
  const cons={};
  raw.forEach(p=>{
    const k=p.ticker+'|'+p.nombre;
    if(!cons[k]) cons[k]={...p, cantidad:0};
    // Solo acumular cantidades positivas (fila Garantía), ignorar la contrapartida negativa
    if(p.cantidad>0) cons[k].cantidad=Math.max(cons[k].cantidad, p.cantidad);
  });
  return Object.values(cons).filter(p=>p.cantidad>0);
}
function cv(v){return currency==='USD'?v/TC:v;}
function sym(){return currency==='USD'?'USD':'$';}
function fmt(n){const a=Math.abs(n),s=n<0?'-':'';if(a>=1e9)return s+(a/1e9).toFixed(2).replace('.',',')+' B';if(a>=1e6)return s+(a/1e6).toFixed(1).replace('.',',')+' M';if(a>=1e3)return s+(a/1e3).toFixed(1).replace('.',',')+' K';return s+a.toFixed(0);}
function fmtFull(n){return new Intl.NumberFormat('es-AR',{maximumFractionDigits:0}).format(n);}
function pct(n,t){return t>0?((n/t)*100).toFixed(1):'0.0';}
function tagClass(t){return{Acciones:'tag-acc',CEDEAR:'tag-ced',ON:'tag-on',Bono:'tag-bon',Letra:'tag-let',FCI:'tag-fci','Pagaré':'tag-pag','T-Bill':'tag-tbill',Efectivo:'tag-usd'}[t]||'';}
const colors=['#d94f3a','#5b8fd4','#5bbf8a','#d4924a','#9070cc','#3db0c4','#c06090','#6870d0','#85bc40','#d47030','#35b09a','#a85ab0'];
function classGroup(t){if(['Acciones','CEDEAR'].includes(t))return'Renta Variable';if(['Bono','Letra','ON','T-Bill','Pagaré'].includes(t))return'Renta Fija';if(t==='FCI')return'Fondos';if(t==='Aval')return'Avales';return'Liquidez';}
function donutSVG(data,size=180){const cx=size/2,cy=size/2,r=size*.38,sw=size*.14;const total=data.reduce((s,d)=>s+d.value,0);if(total<=0)return`<svg width="${size}" height="${size}"></svg>`;let cum=0,paths='';data.forEach(d=>{const p=d.value/total;const st=cum*2*Math.PI-Math.PI/2;cum+=p;const en=cum*2*Math.PI-Math.PI/2;const lg=p>.5?1:0;const x1=cx+r*Math.cos(st),y1=cy+r*Math.sin(st),x2=cx+r*Math.cos(en),y2=cy+r*Math.sin(en);paths+=`<path d="M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-linecap="round" opacity="0.9"/>`;});return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${paths}<text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#eceef2" font-family="Barlow Condensed" font-weight="700" font-size="20">${sym()} ${fmt(cv(total))}</text><text x="${cx}" y="${cy+14}" text-anchor="middle" fill="#787d8a" font-family="Barlow" font-size="10">${currency} TOTAL</text></svg>`;}

// ═══════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════
function consList(items){const c={};items.forEach(p=>{if(!c[p.ticker])c[p.ticker]={...p,importeARS:0,cantidad:0};c[p.ticker].importeARS+=p.importeARS;c[p.ticker].cantidad+=p.cantidad;});return Object.values(c).sort((a,b)=>b.importeARS-a.importeARS);}
function renderAll(){
  if(!positions.length){document.getElementById('emptyState').style.display='';document.getElementById('controlsBar').style.display='none';document.getElementById('tabsBar').style.display='none';document.getElementById('kpiRow').innerHTML='';['resumen','renta-variable','renta-fija','liquidez','cuentas'].forEach(t=>document.getElementById('tab-'+t).innerHTML='');return;}
  document.getElementById('emptyState').style.display='none';document.getElementById('controlsBar').style.display='';document.getElementById('tabsBar').style.display='';document.getElementById('fxDisplay').textContent=`TC: ARS/USD ${TC.toLocaleString('es-AR',{minimumFractionDigits:2})}`;
  const data=getFiltered();const totalARS=data.reduce((s,p)=>s+p.importeARS,0);const garantiaARS=data.filter(p=>p.estado==='Garantía').reduce((s,p)=>s+p.importeARS,0);const disponibleARS=totalARS-garantiaARS;
  const kpis=[{label:selectedEstado==='all'?'Total Consolidado':`Total ${selectedEstado}`,value:`${sym()} ${fmt(cv(totalARS))}`,sub:currency==='ARS'?`≈ USD ${fmtFull(Math.round(totalARS/TC))}`:`≈ ARS ${fmtFull(Math.round(totalARS))}`}];
  if(allAccounts.length>1){allAccounts.forEach(a=>{if(!selectedAccounts.includes(a))return;const v=data.filter(p=>p.cuenta===a).reduce((s,p)=>s+p.importeARS,0);kpis.push({label:`Cuenta ${a}`,value:`${sym()} ${fmt(cv(v))}`,sub:acctNames[a]||''});});}

ass="num">${pct(p.importeARS,totalARS)}%</td></tr>`).join('')}</tbody></table></div>`;

  document.getElementById('tab-renta-fija').innerHTML=renderRF('Bonos Soberanos',data.filter(p=>p.tipo==='Bono'),'var(--orange)')+renderRF('Letras del Tesoro',data.filter(p=>p.tipo==='Letra'),'var(--cyan)')+renderRF('Obligaciones Negociables',data.filter(p=>p.tipo==='ON'),'var(--green)')+renderRF('Pagarés Bursátiles',data.filter(p=>p.tipo==='Pagaré'),'var(--text-muted)')+renderRF('US Treasury Bills',data.filter(p=>p.tipo==='T-Bill'),'var(--blue)');

document.querySelectorAll('.cur-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.cur-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currency=b.dataset.cur;renderAll();});});

const overlay=document.getElementById('modalOverlay'),pasteArea=document.getElementById('pasteArea'),modalInfo=document.getElementById('modalInfo');
document.getElementById('btnImport').addEventListener('click',()=>{overlay.classList.add('open');pasteArea.value='';pendingCount=0;modalInfo.textContent='Pegá una comitente y presioná "+ Agregar" para acumular, o "Procesar Todo" si es una sola.';modalInfo.className='modal-info';setTimeout(()=>pasteArea.focus(),100);});
document.getElementById('modalClose').addEventListener('click',()=>overlay.classList.remove('open'));

document.getElementById('btnAdd').addEventListener('click',()=>{
  const t=pasteArea.value.trim();
  if(!t){modalInfo.textContent='El campo está vacío.';modalInfo.className='modal-info error';return;}
  try {
    const r=importExtract(t);
    if(r.success){
      pendingCount++;
      pasteArea.value='';
      modalInfo.textContent=`✓ ${r.message} — ${pendingCount} comitente${pendingCount>1?'s':''} cargada${pendingCount>1?'s':''}. Pegá la siguiente o presioná "Procesar Todo".`;
      modalInfo.className='modal-info success';
      rebuildAccountChips();
      renderAll();
      setTimeout(()=>pasteArea.focus(),100);
    } else {
      modalInfo.textContent='✗ '+r.message;
      modalInfo.className='modal-info error';
    }
  } catch(e) {
    modalInfo.textContent='✗ Error JS: '+e.message;
    modalInfo.className='modal-info error';
    console.error(e);
  }
});

document.getElementById('btnParse').addEventListener('click',()=>{
  const t=pasteArea.value.trim();
  if(!t && pendingCount>0){overlay.classList.remove('open');return;}

});

function buildSlideHTML() {
  const cv = (ars) => ars / TC;
  const fmt = (n) => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(0)+'K' : Math.round(n).toLocaleString('es-AR');
  const fmtU = (n) => 'U$S ' + fmt(n);
  const pct = (a,b) => b ? Math.round(a/b*100)+'%' : '0%';

  const data = positions.filter(p => {
    if (!selectedAccounts.includes(p.cuenta)) return false;
    if (selectedEstado !== 'all' && p.estado !== selectedEstado) return false;
    return true;
  });

  const totalARS = data.reduce((s,p) => s+p.importeARS, 0);
  const totalUSD = cv(totalARS);
  const gtia = data.filter(p => p.estado === 'Garantía');
  const gtiaUSD = cv(gtia.reduce((s,p) => s+p.importeARS, 0));
  const gtiaP = pct(gtia.reduce((s,p)=>s+p.importeARS,0), totalARS);

  const rf = data.filter(p => ['Bono','Letra','ON','Pagaré','T-Bill'].includes(p.tipo));
  const rfP = pct(rf.reduce((s,p)=>s+p.importeARS,0), totalARS);

  const byClass = {
    'Renta Fija': { color:'#3db0c4', val: rf.reduce((s,p)=>s+p.importeARS,0) },
    'Renta Variable': { color:'#5b8fd4', val: data.filter(p=>['Acciones','CEDEAR'].includes(p.tipo)).reduce((s,p)=>s+p.importeARS,0) },
    'Liquidez': { color:'#5bbf8a', val: data.filter(p=>p.tipo==='Efectivo').reduce((s,p)=>s+p.importeARS,0) },
    'FCIs': { color:'#c06090', val: data.filter(p=>p.tipo==='FCI').reduce((s,p)=>s+p.importeARS,0) }
  };
  const classEntries = Object.entries(byClass).filter(([,v])=>v.val>0).sort((a,b)=>b[1].val-a[1].val);

  // Donut arcs
  let offset = 0;
  const circ = 2 * Math.PI * 38;
  const arcs = classEntries.map(([lbl, v]) => {
    const frac = totalARS ? v.val/totalARS : 0;
    const dash = frac * circ;
    const arc = `<circle cx="50" cy="50" r="38" fill="none" stroke="${v.color}" stroke-width="16" stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 50 50)"/>`;
    offset += dash;
    return arc;
  }).join('');

  const legendItems = classEntries.map(([lbl,v]) =>
    `<div style="display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:7px">
      <div style="width:8px;height:8px;border-radius:3px;background:${v.color};flex-shrink:0"></div>
      <span style="font-weight:700;width:32px;text-align:right;font-variant-numeric:tabular-nums;font-size:12px">${pct(v.val,totalARS)}</span>
      <span style="color:#a8adb8">${lbl}</span>
    </div>`).join('');

  // Desglose por tipo
  const byType = {};
  data.forEach(p => { byType[p.tipo] = (byType[p.tipo]||0) + p.importeARS; });
  const typeColors = {'Bono':'#d4924a','Acciones':'#5b8fd4','Letra':'#3db0c4','Efectivo':'#5bbf8a','CEDEAR':'#9070cc','ON':'#5bbf8a','FCI':'#c06090','Pagaré':'#a8adb8','T-Bill':'#3db0c4'};
  const typeEntries = Object.entries(byType).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxType = typeEntries[0]?.[1]||1;
  const barRows = typeEntries.map(([tipo,val]) => {
    const w = Math.max((val/maxType)*100, 3).toFixed(0);
    const col = typeColors[tipo]||'#a8adb8';
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
      <div style="font-size:11px;color:#a8adb8;width:70px;text-align:right;flex-shrink:0">${tipo}</div>
      <div style="flex:1;height:20px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden">
        <div style="width:${w}%;height:100%;background:${col};border-radius:5px;display:flex;align-items:center;padding-left:7px;font-size:10px;font-weight:600;color:#fff">${pct(val,totalARS)}</div>
      </div>
      <div style="font-size:11px;color:#a8adb8;width:64px;text-align:right;flex-shrink:0">${fmtU(cv(val))}</div>
    </div>`;
  }).join('');

  // Top 5
  const tickerColors = ['#d4924a','#5b8fd4','#3db0c4','#9070cc','#5bbf8a'];
  const cons = {};
  data.forEach(p => {
    const k = p.ticker;
    if (!cons[k]) cons[k] = {...p, importeARS:0};
    cons[k].importeARS += p.importeARS;
  });
  const top5 = Object.values(cons).sort((a,b)=>b.importeARS-a.importeARS).slice(0,5);
  const top5Rows = top5.map((p,i) =>
    `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:rgba(255,255,255,0.04);border-radius:7px;margin-bottom:8px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:#787d8a;width:14px;text-align:center;flex-shrink:0">${i+1}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.5px;width:50px;flex-shrink:0;color:${tickerColors[i]}">${p.ticker}</div>
      <div style="font-size:11px;color:#a8adb8;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(p.nombre||'').substring(0,26)}${(p.nombre||'').length>26?'…':''}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:#5bbf8a;flex-shrink:0">${fmtU(cv(p.importeARS))}</div>
      <div style="font-size:10px;color:#787d8a;width:26px;text-align:right;flex-shrink:0">${pct(p.importeARS,totalARS)}</div>
    </div>`).join('');

  const fechaTxt = document.getElementById('headerDate').textContent;

  return `<div id="__slide_export__" style="background:#2a2d33;border-radius:16px;padding:32px 40px;font-family:Arial,sans-serif;color:#eceef2;width:1100px;border:1px solid #44484f">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;border-bottom:1px solid #44484f;padding-bottom:16px">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:38px;height:38px;background:linear-gradient(135deg,#d94f3a,#a04020);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px;color:#fff">R</div>
        <div>
          <div style="font-weight:700;font-size:21px;letter-spacing:0.5px">PANEL DE INVERSIONES</div>
          <div style="font-size:12px;color:#a8adb8">Roagro SA — Resumen Ejecutivo</div>
        </div>
      </div>
      <div style="font-size:12px;color:#787d8a;background:#32363d;padding:6px 14px;border-radius:8px;border:1px solid #44484f">${fechaTxt}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">

async function exportPNG() {
  const btn = document.getElementById('btnExportPNG');
  btn.textContent = 'Generando...';
  btn.disabled = true;
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1';
  wrapper.innerHTML = buildSlideHTML();
  document.body.appendChild(wrapper);
  const slide = wrapper.querySelector('#__slide_export__');
  try {
    const canvas = await html2canvas(slide, { backgroundColor:'#2a2d33', scale:1.5, useCORS:true, logging:false });
    const link = document.createElement('a');
    link.download = 'roagro-cartera-' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) { alert('Error al generar PNG: '+e.message); }
  document.body.removeChild(wrapper);
  btn.textContent = '↓ RESUMEN PNG';
  btn.disabled = false;
}

document.getElementById('btnExportPNG').addEventListener('click', exportPNG);

document.getElementById('btnClear').addEventListener('click', () => {
  if (!confirm('¿Confirmás que querés limpiar todos los datos cargados?')) return;
  positions = [];
  allAccounts = [];
  selectedAccounts = [];
  Object.keys(acctNames).forEach(k => delete acctNames[k]);
  TC = 1415;
  pendingCount = 0;
  selectedEfectivo = 'all';
  selectedEstado = 'all';
  document.getElementById('headerDate').textContent = '📅 —';
  document.getElementById('controlsBar').style.display = 'none';
  document.getElementById('tabsBar').style.display = 'none';
  document.getElementById('kpiRow').innerHTML = '';
  document.getElementById('emptyState').style.display = 'block';
  document.getElementById('emptyState').querySelector('h2').textContent = 'Sin datos cargados';
  document.getElementById('emptyState').querySelector('p').textContent = 'Pegá el texto del extracto de AUNE usando el botón "Cargar Extracto" para comenzar.';
  ['tab-resumen','tab-renta-variable','tab-renta-fija','tab-liquidez','tab-cuentas'].forEach(id => document.getElementById(id).innerHTML = '');
  showExportBtn();
  if(window._firebaseSave) window._firebaseSave();
});

renderAll();

// ── Cargar datos al iniciar ──
if(window._firebaseLoad) window._firebaseLoad();

</script>
